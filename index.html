<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>有啥好吃的?</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍽️</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        html,body{background:#0a0a0a;color:#e5e5e5;font-family:'Noto Sans TC',sans-serif;max-width:100vw;overflow-x:hidden}
        .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
        .no-scrollbar::-webkit-scrollbar{display:none}
        input[type=range]{-webkit-appearance:none;width:100%;background:transparent}
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;height:20px;width:20px;border-radius:50%;background:#D4AF37;cursor:pointer;margin-top:-9px;box-shadow:0 0 10px rgba(212,175,55,.3);border:2px solid #0a0a0a}
        input[type=range]::-webkit-slider-runnable-track{width:100%;height:2px;background:rgba(255,255,255,.1);border-radius:1px}
        .quote-bg::before{content:'"';position:absolute;top:-10px;left:-5px;font-size:3rem;color:rgba(212,175,55,.15);line-height:1}
        .btn-transition{transition:background .2s,color .2s,border-color .2s,transform .15s}
        .gold{color:#D4AF37}
        .serif{font-family:'Noto Serif TC',serif}
    </style>
</head>
<body style="margin:0;width:100%;height:100vh;display:flex;flex-direction:column;position:relative">

<!-- 背景光暈 -->
<div style="position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden">
    <div style="position:absolute;top:-10%;left:-10%;width:300px;height:300px;background:rgba(120,60,0,.1);border-radius:50%;filter:blur(80px)"></div>
    <div style="position:absolute;bottom:-5%;right:-5%;width:250px;height:250px;background:rgba(80,80,80,.2);border-radius:50%;filter:blur(60px)"></div>
</div>

<!-- Header -->
<header style="background:rgba(10,10,10,.8);backdrop-filter:blur(20px);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0">
    <h1 class="serif" style="font-size:18px;font-weight:700;color:white;letter-spacing:.15em;margin:0">有啥好吃的?</h1>
    <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:9px;color:rgba(255,255,255,.35);font-family:monospace;font-weight:700">v1.5</span>
        <span style="font-size:8px;color:rgba(255,255,255,.18);font-family:monospace">2026.04.18 01:10</span>
        <div id="header-location" style="display:none;align-items:center;gap:6px;font-size:10px;padding:4px 12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:20px;color:rgba(255,255,255,.7)">
            <i data-lucide="map-pin" style="width:12px;height:12px;color:#D4AF37;flex-shrink:0"></i>
            <span id="header-location-text" class="serif" style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">定位中...</span>
        </div>
    </div>
</header>

<!-- Main -->
<main id="main-scroll-area" class="no-scrollbar" style="flex:1;overflow-y:auto;position:relative;z-index:5">

<!-- 設定畫面 -->
<div id="step-setup" style="padding:24px 24px 120px;max-width:480px;margin:0 auto">
    <div style="margin:16px 0 32px">
        <h2 id="main-greeting" class="serif" style="font-size:28px;font-weight:700;color:white;margin:0 0 8px;letter-spacing:.1em;line-height:1.3">尋找<br><span class="gold">極致美味</span>。</h2>
        <p id="sub-greeting" style="color:rgba(255,255,255,.4);font-size:13px;font-weight:300;letter-spacing:.1em;margin:0">為您的夜晚，訂製專屬菜單</p>
    </div>

    <!-- Location -->
    <div style="margin-bottom:28px">
        <label style="font-size:10px;font-weight:500;letter-spacing:.2em;color:rgba(255,255,255,.5);text-transform:uppercase;display:flex;align-items:center;gap:6px;margin-bottom:10px">
            <i data-lucide="compass" style="width:12px;height:12px;color:#D4AF37"></i> Location
        </label>
        <div id="location-display-area" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer">
            <div style="display:flex;align-items:center;gap:12px;color:rgba(255,255,255,.8);min-width:0">
                <i data-lucide="loader-2" id="auto-locating-icon" style="width:16px;height:16px;color:#D4AF37;flex-shrink:0;animation:spin 1s linear infinite"></i>
                <i data-lucide="map-pin" id="auto-located-icon" style="width:16px;height:16px;color:#D4AF37;flex-shrink:0;display:none"></i>
                <span id="location-display-text" class="serif" style="font-size:14px;letter-spacing:.05em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">定位中...</span>
            </div>
            <i data-lucide="pen-line" style="width:14px;height:14px;color:rgba(255,255,255,.3);flex-shrink:0"></i>
        </div>
        <div id="location-input-area" style="display:none;gap:8px;margin-top:8px">
            <input type="text" id="location-input" placeholder="輸入城市或區域" class="serif" style="flex:1;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:14px 20px;font-size:14px;color:white;outline:none;width:100%;box-sizing:border-box">
            <button id="re-gps-btn" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:14px;color:rgba(255,255,255,.7);cursor:pointer;flex-shrink:0">
                <i data-lucide="crosshair" style="width:18px;height:18px;display:block"></i>
            </button>
        </div>
        <p id="location-warning" style="display:none;color:#f87171;font-size:12px;margin-top:6px;letter-spacing:.1em">請先設定地點</p>
    </div>

    <!-- Time -->
    <div style="margin-bottom:28px">
        <label style="font-size:10px;font-weight:500;letter-spacing:.2em;color:rgba(255,255,255,.5);text-transform:uppercase;display:flex;align-items:center;gap:6px;margin-bottom:10px">
            <i data-lucide="clock" style="width:12px;height:12px;color:#D4AF37"></i> Time
        </label>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
            <button class="meal-btn btn-transition" data-meal="breakfast" style="padding:10px;border-radius:24px;font-size:11px;font-weight:500;letter-spacing:.1em;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);cursor:pointer">早餐</button>
            <button class="meal-btn btn-transition" data-meal="brunch" style="padding:10px;border-radius:24px;font-size:11px;font-weight:500;letter-spacing:.1em;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);cursor:pointer">早午餐</button>
            <button class="meal-btn btn-transition" data-meal="lunch" style="padding:10px;border-radius:24px;font-size:11px;font-weight:500;letter-spacing:.1em;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);cursor:pointer">午餐</button>
            <button class="meal-btn btn-transition" data-meal="tea" style="padding:10px;border-radius:24px;font-size:11px;font-weight:500;letter-spacing:.1em;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);cursor:pointer">午茶</button>
            <button class="meal-btn btn-transition" data-meal="dinner" style="padding:10px;border-radius:24px;font-size:11px;font-weight:500;letter-spacing:.1em;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);cursor:pointer">晚餐</button>
            <button class="meal-btn btn-transition" data-meal="latenight" style="padding:10px;border-radius:24px;font-size:11px;font-weight:500;letter-spacing:.1em;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);cursor:pointer">宵夜</button>
        </div>
    </div>

    <!-- Budget -->
    <div style="margin-bottom:28px">
        <label style="font-size:10px;font-weight:500;letter-spacing:.2em;color:rgba(255,255,255,.5);text-transform:uppercase;display:flex;align-items:center;gap:6px;margin-bottom:10px">
            <i data-lucide="circle-dollar-sign" style="width:12px;height:12px;color:#D4AF37"></i> Budget
        </label>
        <div style="display:flex;gap:4px;background:rgba(255,255,255,.05);padding:4px;border-radius:16px">
            <button class="budget-btn btn-transition" data-val="$" style="flex:1;padding:12px 4px;border-radius:12px;font-size:10px;font-weight:500;letter-spacing:.1em;border:1px solid transparent;background:transparent;color:rgba(255,255,255,.4);cursor:pointer">日常便飯</button>
            <button class="budget-btn btn-transition" data-val="$$" style="flex:1;padding:12px 4px;border-radius:12px;font-size:10px;font-weight:500;letter-spacing:.1em;border:1px solid transparent;background:transparent;color:rgba(255,255,255,.4);cursor:pointer">精緻享受</button>
            <button class="budget-btn btn-transition" data-val="$$$" style="flex:1;padding:12px 4px;border-radius:12px;font-size:10px;font-weight:500;letter-spacing:.1em;border:1px solid transparent;background:transparent;color:rgba(255,255,255,.4);cursor:pointer">奢華饗宴</button>
        </div>
    </div>

    <!-- Guests -->
    <div style="margin-bottom:28px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
            <label style="font-size:10px;font-weight:500;letter-spacing:.2em;color:rgba(255,255,255,.5);text-transform:uppercase;display:flex;align-items:center;gap:6px">
                <i data-lucide="users" style="width:12px;height:12px;color:#D4AF37"></i> Guests
            </label>
            <span id="people-count-display" class="serif" style="font-size:16px;font-weight:700;color:white;letter-spacing:.1em">2 人</span>
        </div>
        <input type="range" id="people-slider" min="1" max="10" value="2" style="width:100%">
    </div>

    <!-- Vibe -->
    <div style="margin-bottom:32px">
        <label style="font-size:10px;font-weight:500;letter-spacing:.2em;color:rgba(255,255,255,.5);text-transform:uppercase;display:flex;align-items:center;gap:6px;margin-bottom:10px">
            <i data-lucide="sparkles" style="width:12px;height:12px;color:#D4AF37"></i> Vibe
        </label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <button class="vibe-btn btn-transition" data-vibe="casual" style="display:flex;align-items:center;justify-content:center;gap:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);border-radius:12px;padding:12px;font-size:11px;font-weight:500;cursor:pointer"><i data-lucide="coffee" style="width:14px;height:14px"></i>輕鬆</button>
            <button class="vibe-btn btn-transition" data-vibe="date" style="display:flex;align-items:center;justify-content:center;gap:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);border-radius:12px;padding:12px;font-size:11px;font-weight:500;cursor:pointer"><i data-lucide="wine" style="width:14px;height:14px"></i>浪漫</button>
            <button class="vibe-btn btn-transition" data-vibe="party" style="display:flex;align-items:center;justify-content:center;gap:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);border-radius:12px;padding:12px;font-size:11px;font-weight:500;cursor:pointer"><i data-lucide="glass-water" style="width:14px;height:14px"></i>歡聚</button>
            <button class="vibe-btn btn-transition" data-vibe="work" style="display:flex;align-items:center;justify-content:center;gap:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);border-radius:12px;padding:12px;font-size:11px;font-weight:500;cursor:pointer"><i data-lucide="laptop-2" style="width:14px;height:14px"></i>靜心</button>
        </div>
    </div>

    <button id="find-btn" style="width:100%;background:white;color:black;font-family:'Noto Serif TC',serif;font-weight:700;font-size:14px;letter-spacing:.2em;padding:16px;border-radius:14px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;text-transform:uppercase">
        <i data-lucide="sparkles" style="width:16px;height:16px"></i> AI 智慧探索
    </button>
    <p id="ai-error-msg" style="display:none;text-align:center;color:#f87171;font-size:11px;margin-top:12px;letter-spacing:.1em"></p>
</div>

<!-- 載入畫面 -->
<div id="step-loading" style="display:none;position:absolute;inset:0;background:rgba(10,10,10,.9);backdrop-filter:blur(20px);flex-direction:column;align-items:center;justify-content:center;z-index:20;text-align:center;padding:24px">
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    <div style="width:40px;height:40px;border:3px solid rgba(255,255,255,.1);border-top-color:#D4AF37;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:20px"></div>
    <p id="loading-text" class="serif" style="color:white;letter-spacing:.2em;font-size:14px;text-transform:uppercase">AI 正在為您搜尋...</p>
</div>

<!-- 結果畫面 -->
<div id="step-results" style="display:none;padding:20px 20px 140px;max-width:480px;margin:0 auto">
    <!-- List/Map toggle -->
    <div style="display:flex;background:rgba(255,255,255,.05);padding:4px;border-radius:24px;border:1px solid rgba(255,255,255,.08);margin-bottom:16px;position:relative">
        <div id="view-toggle-bg" style="position:absolute;top:4px;left:4px;height:calc(100% - 8px);width:calc(50% - 4px);background:white;border-radius:20px;transition:transform .3s"></div>
        <button id="view-list-btn" style="flex:1;padding:10px;font-size:10px;font-weight:700;letter-spacing:.2em;border-radius:20px;border:none;background:transparent;color:black;cursor:pointer;position:relative;z-index:1;text-transform:uppercase">List</button>
        <button id="view-map-btn" style="flex:1;padding:10px;font-size:10px;font-weight:700;letter-spacing:.2em;border-radius:20px;border:none;background:transparent;color:rgba(255,255,255,.5);cursor:pointer;position:relative;z-index:1;text-transform:uppercase">Map</button>
    </div>
    <button id="roulette-btn" style="width:100%;background:transparent;border:1px solid rgba(212,175,55,.4);color:#D4AF37;font-family:'Noto Serif TC',serif;font-size:12px;letter-spacing:.15em;padding:14px;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;text-transform:uppercase;margin-bottom:20px">
        <i data-lucide="dices" style="width:16px;height:16px"></i> Random Pick
    </button>
    <div id="restaurant-list-view"></div>
    <div id="restaurant-map-view" style="display:none;height:50vh;border-radius:20px;overflow:hidden;border:1px solid rgba(255,255,255,.1);background:#0a0a0a;position:relative">
        <div id="map-pins-container" style="position:absolute;inset:0"></div>
    </div>
</div>
</main>

<!-- 底部按鈕 -->
<div id="bottom-actions" style="display:none;position:fixed;bottom:0;width:100%;padding:16px 20px 28px;background:rgba(10,10,10,.85);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.08);z-index:15;box-sizing:border-box">
    <div style="display:flex;gap:10px;max-width:480px;margin:0 auto">
        <button id="back-to-setup" style="padding:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;color:rgba(255,255,255,.6);cursor:pointer"><i data-lucide="sliders-horizontal" style="width:20px;height:20px;display:block"></i></button>
        <button id="refresh-btn" style="flex:1;background:rgba(255,255,255,.05);color:white;font-family:'Noto Serif TC',serif;font-size:11px;letter-spacing:.15em;padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,.1);cursor:pointer;text-transform:uppercase">Shuffle</button>
        <button id="share-btn" style="flex:1;background:white;color:black;font-family:'Noto Serif TC',serif;font-weight:700;font-size:11px;letter-spacing:.15em;padding:14px;border-radius:14px;border:none;cursor:pointer;text-transform:uppercase">Share</button>
    </div>
</div>

<!-- 轉盤 Modal -->
<div id="roulette-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:50;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(20px)">
    <div style="background:#121212;width:100%;max-width:320px;border-radius:24px;padding:32px;text-align:center;border:1px solid rgba(255,255,255,.1)">
        <div style="width:40px;height:40px;border-radius:50%;border:1px solid rgba(212,175,55,.3);background:rgba(212,175,55,.05);display:flex;align-items:center;justify-content:center;margin:0 auto 24px">
            <i data-lucide="concierge-bell" style="width:20px;height:20px;color:#D4AF37"></i>
        </div>
        <div style="height:72px;display:flex;align-items:center;justify-content:center;border-top:1px solid rgba(255,255,255,.1);border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:24px">
            <div id="slot-text" class="serif" style="font-size:18px;font-weight:700;color:white;padding:0 16px;letter-spacing:.1em">...</div>
        </div>
        <button id="close-roulette" style="display:none;width:100%;background:white;color:black;font-family:'Noto Serif TC',serif;font-weight:700;letter-spacing:.2em;padding:14px;border-radius:14px;border:none;cursor:pointer;text-transform:uppercase;font-size:12px">Accept</button>
    </div>
</div>

<!-- 詳細 Modal -->
<div id="detail-modal" style="position:fixed;inset:0;z-index:60;background:#0a0a0a;overflow-y:auto;transform:translateY(100%);transition:transform .5s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column;pointer-events:none" class="no-scrollbar">
    <div style="position:relative;width:100%;height:35vh;flex-shrink:0">
        <img id="detail-img" src="" style="width:100%;height:100%;object-fit:cover;opacity:.85">
        <div style="position:absolute;inset:0;background:linear-gradient(to top,#0a0a0a,transparent)"></div>
        <button id="close-detail-btn" style="position:absolute;top:20px;right:20px;padding:10px;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.1);border-radius:50%;color:white;cursor:pointer"><i data-lucide="x" style="width:18px;height:18px;display:block"></i></button>
    </div>
    <div style="flex:1;padding:0 24px 48px;margin-top:-32px;position:relative;z-index:1;max-width:480px;width:100%;box-sizing:border-box;margin-left:auto;margin-right:auto">
        <h2 id="detail-name" class="serif" style="font-size:24px;font-weight:700;color:white;letter-spacing:.15em;margin:0 0 12px"></h2>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:24px">
            <div style="display:flex;align-items:center;gap:6px;background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.3);padding:4px 12px;border-radius:20px">
                <i data-lucide="star" style="width:12px;height:12px;color:#D4AF37;fill:#D4AF37"></i>
                <span id="detail-rating" style="font-size:12px;font-weight:700;color:#D4AF37"></span>
            </div>
        </div>
        <div style="margin-bottom:24px;padding-left:14px;border-left:2px solid rgba(212,175,55,.3)">
            <p style="font-size:10px;font-weight:500;color:rgba(255,255,255,.3);letter-spacing:.2em;text-transform:uppercase;margin:0 0 8px">About</p>
            <p id="detail-desc" style="font-size:13px;color:rgba(255,255,255,.7);line-height:1.7;font-weight:300;margin:0"></p>
        </div>
        <div id="detail-dishes" style="margin-bottom:24px"></div>
        <div id="detail-extra"></div>
        <a id="detail-nav-btn" href="#" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:white;color:black;font-family:'Noto Serif TC',serif;font-weight:700;font-size:11px;letter-spacing:.2em;padding:16px;border-radius:14px;text-decoration:none;text-transform:uppercase;box-sizing:border-box">
            <i data-lucide="navigation" style="width:16px;height:16px"></i> Maps Navigate
        </a>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

// ── DOM refs ──────────────────────────────────────────────
var dom = {
    stepSetup:        document.getElementById('step-setup'),
    stepLoading:      document.getElementById('step-loading'),
    stepResults:      document.getElementById('step-results'),
    bottomActions:    document.getElementById('bottom-actions'),
    findBtn:          document.getElementById('find-btn'),
    refreshBtn:       document.getElementById('refresh-btn'),
    backBtn:          document.getElementById('back-to-setup'),
    shareBtn:         document.getElementById('share-btn'),
    mainGreeting:     document.getElementById('main-greeting'),
    subGreeting:      document.getElementById('sub-greeting'),
    locDisplayArea:   document.getElementById('location-display-area'),
    locInputArea:     document.getElementById('location-input-area'),
    locInput:         document.getElementById('location-input'),
    locDisplayText:   document.getElementById('location-display-text'),
    autoLocatingIcon: document.getElementById('auto-locating-icon'),
    autoLocatedIcon:  document.getElementById('auto-located-icon'),
    reGpsBtn:         document.getElementById('re-gps-btn'),
    locWarning:       document.getElementById('location-warning'),
    peopleSlider:     document.getElementById('people-slider'),
    peopleCount:      document.getElementById('people-count-display'),
    mealBtns:         document.querySelectorAll('.meal-btn'),
    budgetBtns:       document.querySelectorAll('.budget-btn'),
    vibeBtns:         document.querySelectorAll('.vibe-btn'),

// ── Helpers ───────────────────────────────────────────────
function show(el) { el.style.display = ''; }
function hide(el) { el.style.display = 'none'; }
function flex(el) { el.style.display = 'flex'; }

function showOnly(target) {
    hide(dom.stepSetup); hide(dom.stepLoading); hide(dom.stepResults);
    hide(dom.bottomActions); hide(dom.headerLoc);
    show(target);
    if (target === dom.stepResults) {
        flex(dom.bottomActions);
        flex(dom.headerLoc);
        dom.headerLocText.textContent = state.locationText;
    }
    if (target === dom.stepLoading) {
        dom.stepLoading.style.display = 'flex';
    }
}

// ── GPS ───────────────────────────────────────────────────
function triggerAutoLocation() {
    state.isLocationReady = false;
    dom.autoLocatingIcon.style.display = '';
    dom.autoLocatedIcon.style.display = 'none';
    dom.locDisplayText.textContent = '定位中...';
    if (!navigator.geolocation) { dom.locDisplayText.textContent = '請手動輸入地點'; dom.autoLocatingIcon.style.display = 'none'; return; }
    navigator.geolocation.getCurrentPosition(
        function(pos) {
            fetch('https://nominatim.openstreetmap.org/reverse?lat='+pos.coords.latitude+'&lon='+pos.coords.longitude+'&format=json&accept-language=zh-TW')
                .then(function(r){ return r.json(); })
                .then(function(d){
                    var a = d.address || {};
                    state.locationText = (a.suburb||a.neighbourhood||a.city_district||'') + (a.city||a.town||a.county||'') || d.display_name.split(',')[0];
                    dom.locInput.value = state.locationText;
                    state.isLocationReady = true;
                    dom.autoLocatingIcon.style.display = 'none';
                    dom.autoLocatedIcon.style.display = '';
                    dom.locDisplayText.textContent = state.locationText;
                }).catch(function(){
                    state.locationText = pos.coords.latitude.toFixed(3)+','+pos.coords.longitude.toFixed(3);
                    state.isLocationReady = true;
                    dom.autoLocatingIcon.style.display = 'none';
                    dom.autoLocatedIcon.style.display = '';
                    dom.locDisplayText.textContent = state.locationText;
                });
        },
        function() { dom.autoLocatingIcon.style.display = 'none'; dom.locDisplayText.textContent = '無法定位，請手動輸入'; dom.locDisplayArea.click(); },
        { enableHighAccuracy:true, timeout:10000 }
    );
}

// ── AI ────────────────────────────────────────────────────
async function getAIRecommendations() {
    var mealMap = { breakfast:'早餐', brunch:'早午餐', lunch:'午餐', tea:'下午茶', dinner:'晚餐', latenight:'宵夜' };
    var vibeMap = { casual:'輕鬆休閒', date:'浪漫約會', party:'歡聚慶祝', work:'安靜專注' };
    var budgetMap = { '$':'平價實惠', '$$':'精緻享受', '$$$':'奢華饗宴' };
    var prompt = '你是台灣美食專家。推薦3家在「'+state.locationText+'」真實存在的餐廳。時段：'+mealMap[state.meal]+'，預算：'+budgetMap[state.budget]+'，人數：'+state.people+'人，氣氛：'+vibeMap[state.vibe]+'。只回傳合法JSON，不加說明或markdown。格式：{"restaurants":[{"name":"餐廳名","rating":4.5,"reviews":1000,"price":"$200-400/人","tags":["標籤"],"cuisine":"料理類型","desc":"詳細介紹50字","story":"背景故事","review":"顧客評語","mustOrder":"必點推薦","dishes":["菜1","菜2","菜3","菜4","菜5"],"hours":"營業時間","phone":"電話","address":"地址","nearbyMRT":"捷運站","parking":"停車","reservation":"訂位方式","tips":"小提示","imgKeyword":"english food keyword"}]}';
    try {
        var res = await fetch('https://green-queen-06f3.rh-taipei.workers.dev', {
            method:'POST',
            headers:{'content-type':'application/json'},
            body:JSON.stringify({ model:'llama-3.3-70b-versatile', max_tokens:4096, messages:[{role:'user',content:prompt}] })
        });
        var rawText = await res.text();
        var data;
        try { data = JSON.parse(rawText); } catch(e) { throw new Error('HTTP '+res.status+': '+rawText.slice(0,100)); }
        if (data.error) throw new Error(data.error.message);
        var txt = (data.choices[0].message.content || '');
        var clean = txt.replace(/```json/g,'').replace(/```/g,'').trim();
        var objStart = clean.indexOf('{'), objEnd = clean.lastIndexOf('}');
        if (objStart === -1) throw new Error('no JSON: '+txt.slice(0,100));
        var parsed = JSON.parse(clean.slice(objStart, objEnd+1));
        var restaurants = parsed.restaurants || [];
        var fallbacks = [
            'https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=400&q=80',
            'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400&q=80',
            'https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?w=400&q=80',
        ];
        restaurants.forEach(function(r, i) {
            r.id = Date.now() + i;
            r.img = fallbacks[i % fallbacks.length];
            sessionResults.push(r);
        });
        // Fetch Wikipedia images
        restaurants.forEach(function(r, i) {
            setTimeout(function() {
                fetch('https://zh.wikipedia.org/w/api.php?action=query&titles='+encodeURIComponent(r.name)+'&prop=pageimages&format=json&pithumbsize=600&origin=*')
                    .then(function(res){ return res.json(); })
                    .then(function(d){
                        var pages = d.query.pages, page = pages[Object.keys(pages)[0]];
                        if (page && page.thumbnail) updateImg(r, page.thumbnail.source);
                        else return fetch('https://en.wikipedia.org/w/api.php?action=query&titles='+encodeURIComponent(r.name)+'&prop=pageimages&format=json&pithumbsize=600&origin=*')
                            .then(function(r2){ return r2.json(); })
                            .then(function(d2){
                                var p2 = d2.query.pages[Object.keys(d2.query.pages)[0]];
                                if (p2 && p2.thumbnail) updateImg(r, p2.thumbnail.source);
                            });
                    }).catch(function(){});
            }, i * 600);
        });
        return restaurants;
    } catch(e) {
        window._lastErr = e.message;
        return [];
    }
}

function updateImg(r, url) {
    r.img = url;
    var card = document.querySelector('[data-rid="'+r.id+'"]');
    if (card) { var img = card.querySelector('img'); if (img) img.src = url; }
}

async function performSearch(msg) {
    hide(dom.aiErrorMsg); hide(dom.locWarning);
    if (!state.isLocationReady || !state.locationText) { flex(dom.locWarning); dom.locWarning.style.display = 'block'; return; }
    dom.loadingText.textContent = msg;
    showOnly(dom.stepLoading);
    var results = await getAIRecommendations();
    if (!results.length) {
        showOnly(dom.stepSetup);
        dom.aiErrorMsg.textContent = window._lastErr ? '錯誤：'+window._lastErr.slice(0,80) : 'AI 搜尋遇到問題';
        flex(dom.aiErrorMsg); dom.aiErrorMsg.style.display = 'block';
        return;
    }
    state.currentResults = results;
    renderList(); renderMap();
    showOnly(dom.stepResults);
}

    dom.peopleCount.textContent = state.people + ' 人';
});

dom.viewListBtn.addEventListener('click', function(){
    show(dom.listView); hide(dom.mapView);
    dom.viewToggleBg.style.transform = 'translateX(0)';
    dom.viewListBtn.style.color = 'black';
    dom.viewMapBtn.style.color = 'rgba(255,255,255,.5)';
});

dom.viewMapBtn.addEventListener('click', function(){
    hide(dom.listView); show(dom.mapView);
    dom.viewToggleBg.style.transform = 'translateX(100%)';
    dom.viewMapBtn.style.color = 'black';
    dom.viewListBtn.style.color = 'rgba(255,255,255,.5)';
});

dom.closeDetailBtn.addEventListener('click', function(){
    dom.detailModal.style.transform = 'translateY(100%)';
    dom.detailModal.style.pointerEvents = 'none';
});

dom.rouletteBtn.addEventListener('click', function(){
    if (!state.currentResults.length) return;
    dom.closeRoulette.style.display = 'none';
    dom.slotText.textContent = '...';
    dom.rouletteModal.style.display = 'flex';
    var counter = 0;
    var interval = setInterval(function(){
        dom.slotText.textContent = state.currentResults[counter % state.currentResults.length].name;
        counter++;
    }, 100);
    setTimeout(function(){
        clearInterval(interval);
        var winner = state.currentResults[Math.floor(Math.random()*state.currentResults.length)];
        dom.slotText.innerHTML = '<span style="color:#D4AF37;letter-spacing:.1em">'+winner.name+'</span>';
        dom.closeRoulette.style.display = '';
        dom.closeRoulette.onclick = function(){ hide(dom.rouletteModal); window.openDetail(winner.id); };
    }, 2000);
});

// ── Init ──────────────────────────────────────────────────
lucide.createIcons();
var hour = new Date().getHours();
var type = hour>=5&&hour<10?'breakfast':hour>=10&&hour<12?'brunch':hour>=12&&hour<15?'lunch':hour>=15&&hour<18?'tea':hour>=18&&hour<22?'dinner':'latenight';
setMealType(type);
setBudget('$');
setVibe('casual');
triggerAutoLocation();

}); // end DOMContentLoaded
</script>
