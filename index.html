<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>有啥好吃的?</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍽️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        window.tailwind = window.tailwind || {};
        window.tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                        serif: ['"Noto Serif TC"', 'serif'],
                    },
                    colors: {
                        app: { bg: '#0a0a0a', surface: '#121212', gold: '#D4AF37', 'gold-light': '#F3E5AB' }
                    }
                }
            }
        }
    </script>
    <style>
        html, body { max-width: 100vw; overflow-x: hidden; background-color: #0a0a0a; }
        .no-scrollbar { -ms-overflow-style: none !important; scrollbar-width: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none !important; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #D4AF37; cursor: pointer; margin-top: -9px; box-shadow: 0 0 10px rgba(212,175,55,0.3); border: 2px solid #0a0a0a; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 2px; cursor: pointer; background: rgba(255,255,255,0.1); border-radius: 1px; }
        .quote-bg { position: relative; }
        .quote-bg::before { content: '"'; position: absolute; top: -10px; left: -5px; font-size: 3rem; font-family: serif; color: rgba(212,175,55,0.15); line-height: 1; }
        .mock-map-bg { background-color: #0a0a0a; background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 20px 20px; }
        body { color: #e5e5e5; }
        .meal-btn, .budget-btn, .vibe-btn { transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s; }
    </style>
</head>
<body class="font-sans w-full h-screen flex flex-col relative">

    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-[300px] sm:w-[500px] h-[300px] sm:h-[500px] bg-amber-900/10 rounded-full blur-[80px]"></div>
        <div class="absolute bottom-[-5%] right-[-5%] w-[250px] sm:w-[400px] h-[250px] sm:h-[400px] bg-stone-800/30 rounded-full blur-[60px]"></div>
    </div>

    <header class="bg-app-bg/60 backdrop-blur-2xl px-4 sm:px-6 py-3 flex justify-between items-center z-10 sticky top-0 shrink-0 border-b border-white/5 w-full gap-2" style="position:sticky;top:0;z-index:10">
        <div class="flex items-center min-w-0 flex-1">
            <h1 id="app-top-title" class="text-lg sm:text-xl font-serif font-bold text-white tracking-widest truncate">有啥好吃的?</h1>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
            <span style="font-size:9px;color:rgba(255,255,255,0.3);font-family:monospace;font-weight:600;letter-spacing:0.05em">v1.3</span><span style="font-size:8px;color:rgba(255,255,255,0.15);font-family:monospace;margin-left:4px">2026.04.18 01:00</span>
            <div id="header-location" class="hidden items-center gap-1.5 text-[10px] px-3 py-1.5 bg-white/5 border border-white/10 rounded-full text-white/70 font-medium max-w-[150px] backdrop-blur-md shrink-0">
                <i data-lucide="map-pin" class="w-3 h-3 flex-shrink-0 text-app-gold"></i>
                <span id="header-location-text" class="truncate font-serif">定位中...</span>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto no-scrollbar relative w-full h-full z-10" id="main-scroll-area">

        <!-- 步驟一：設定條件 -->
        <div id="step-setup" class="p-6 pb-32 space-y-8 max-w-lg mx-auto">
            <div class="mt-4 mb-8">
                <h2 id="main-greeting" class="text-2xl sm:text-3xl font-serif font-bold text-white mb-2 tracking-widest leading-tight transition-opacity duration-500">尋找<br><span class="text-app-gold">極致美味</span>。</h2>
                <p id="sub-greeting" class="text-white/40 text-xs sm:text-sm font-light tracking-wider transition-opacity duration-500">為您的夜晚，訂製專屬菜單</p>
            </div>

            <div class="space-y-8">
                <!-- 地點 -->
                <div class="space-y-3">
                    <label class="text-[10px] font-medium tracking-widest text-white/50 uppercase flex items-center gap-2">
                        <i data-lucide="compass" class="w-3 h-3 text-app-gold"></i> Location
                    </label>
                    <div id="location-display-area" class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 flex items-center justify-between cursor-pointer hover:bg-white/10 transition-all backdrop-blur-md">
                        <div class="flex items-center gap-3 text-white/80 min-w-0">
                            <i data-lucide="loader-2" id="auto-locating-icon" class="w-4 h-4 animate-spin text-app-gold shrink-0"></i>
                            <i data-lucide="map-pin" id="auto-located-icon" class="w-4 h-4 hidden text-app-gold shrink-0"></i>
                            <span id="location-display-text" class="font-serif tracking-wider text-sm truncate">定位中...</span>
                        </div>
                        <i data-lucide="pen-line" class="w-4 h-4 text-white/30 shrink-0"></i>
                    </div>
                    <div id="location-input-area" class="hidden flex gap-2">
                        <input type="text" id="location-input" placeholder="輸入想去的城市或區域" class="w-full bg-black/50 border border-white/10 rounded-2xl px-5 py-4 text-sm focus:border-app-gold outline-none text-white font-serif">
                        <button id="re-gps-btn" class="bg-white/5 text-white/70 p-4 rounded-2xl border border-white/10 active:scale-95 transition-all flex-shrink-0">
                            <i data-lucide="crosshair" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <p id="location-warning" class="hidden text-rose-400 text-xs tracking-wider">請先設定地點</p>
                </div>

                <!-- 時段 -->
                <div class="space-y-3 w-full">
                    <label class="text-[10px] font-medium tracking-widest text-white/50 uppercase flex items-center gap-2">
                        <i data-lucide="clock" class="w-3 h-3 text-app-gold"></i> Time
                    </label>
                    <div class="grid grid-cols-3 gap-2 w-full" id="meal-options">
                        <button class="meal-btn py-2.5 rounded-full text-[10px] font-medium tracking-widest transition-all border border-white/10 text-white/50 bg-white/5" data-meal="breakfast">早餐</button>
                        <button class="meal-btn py-2.5 rounded-full text-[10px] font-medium tracking-widest transition-all border border-white/10 text-white/50 bg-white/5" data-meal="brunch">早午餐</button>
                        <button class="meal-btn py-2.5 rounded-full text-[10px] font-medium tracking-widest transition-all border border-white/10 text-white/50 bg-white/5" data-meal="lunch">午餐</button>
                        <button class="meal-btn py-2.5 rounded-full text-[10px] font-medium tracking-widest transition-all border border-white/10 text-white/50 bg-white/5" data-meal="tea">午茶</button>
                        <button class="meal-btn py-2.5 rounded-full text-[10px] font-medium tracking-widest transition-all border border-white/10 text-white/50 bg-white/5" data-meal="dinner">晚餐</button>
                        <button class="meal-btn py-2.5 rounded-full text-[10px] font-medium tracking-widest transition-all border border-white/10 text-white/50 bg-white/5" data-meal="latenight">宵夜</button>
                    </div>
                </div>

                <!-- 預算 -->
                <div class="space-y-3">
                    <label class="text-[10px] font-medium tracking-widest text-white/50 uppercase flex items-center gap-2">
                        <i data-lucide="circle-dollar-sign" class="w-3 h-3 text-app-gold"></i> Budget
                    </label>
                    <div class="flex gap-2 bg-white/5 p-1 rounded-2xl border border-white/5 backdrop-blur-sm">
                        <button class="budget-btn flex-1 py-3 rounded-xl text-[10px] font-medium tracking-widest transition-all text-white/40 border border-transparent" data-val="$">日常便飯</button>
                        <button class="budget-btn flex-1 py-3 rounded-xl text-[10px] font-medium tracking-widest transition-all text-white/40 border border-transparent" data-val="$$">精緻享受</button>
                        <button class="budget-btn flex-1 py-3 rounded-xl text-[10px] font-medium tracking-widest transition-all text-white/40 border border-transparent" data-val="$$$">奢華饗宴</button>
                    </div>
                </div>

                <!-- 人數 -->
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <label class="text-[10px] font-medium tracking-widest text-white/50 uppercase flex items-center gap-2">
                            <i data-lucide="users" class="w-3 h-3 text-app-gold"></i> Guests
                        </label>
                        <span id="people-count-display" class="text-sm font-serif font-bold text-white tracking-widest">2 人</span>
                    </div>
                    <div class="px-2"><input type="range" id="people-slider" min="1" max="10" value="2"></div>
                </div>

                <!-- 氣氛 -->
                <div class="space-y-3">
                    <label class="text-[10px] font-medium tracking-widest text-white/50 uppercase flex items-center gap-2">
                        <i data-lucide="sparkles" class="w-3 h-3 text-app-gold"></i> Vibe
                    </label>
                    <div class="grid grid-cols-2 gap-2" id="vibe-options">
                        <button class="vibe-btn flex items-center justify-center gap-2 border border-white/5 bg-white/5 text-white/50 rounded-xl py-3 text-[10px] font-medium" data-vibe="casual"><i data-lucide="coffee" class="w-3.5 h-3.5"></i>輕鬆</button>
                        <button class="vibe-btn flex items-center justify-center gap-2 border border-white/5 bg-white/5 text-white/50 rounded-xl py-3 text-[10px] font-medium" data-vibe="date"><i data-lucide="wine" class="w-3.5 h-3.5"></i>浪漫</button>
                        <button class="vibe-btn flex items-center justify-center gap-2 border border-white/5 bg-white/5 text-white/50 rounded-xl py-3 text-[10px] font-medium" data-vibe="party"><i data-lucide="glass-water" class="w-3.5 h-3.5"></i>歡聚</button>
                        <button class="vibe-btn flex items-center justify-center gap-2 border border-white/5 bg-white/5 text-white/50 rounded-xl py-3 text-[10px] font-medium" data-vibe="work"><i data-lucide="laptop-2" class="w-3.5 h-3.5"></i>靜心</button>
                    </div>
                </div>
            </div>

            <div class="space-y-4 mt-8 pb-10">
                <button id="find-btn" class="w-full bg-white text-black font-serif font-bold text-sm tracking-[0.2em] py-4 rounded-xl active:scale-[0.98] transition-all flex justify-center items-center gap-3 uppercase">
                    <i data-lucide="sparkles" class="w-4 h-4"></i> AI 智慧探索
                </button>
                <div id="ai-error-msg" class="hidden text-center text-rose-400 text-xs tracking-wider">AI 搜尋遇到問題，請稍後再試</div>
            </div>
        </div>

        <!-- 步驟二：載入中 -->
        <div id="step-loading" class="hidden absolute inset-0 bg-app-bg/80 backdrop-blur-2xl flex flex-col items-center justify-center z-30 px-6 text-center">
            <div class="w-10 h-10 border-4 border-white/10 border-t-app-gold rounded-full animate-spin mb-6"></div>
            <p id="loading-text" class="text-white font-serif tracking-[0.2em] text-sm uppercase">AI 正在為您搜尋...</p>
        </div>

        <!-- 步驟三：推薦結果 -->
        <div id="step-results" class="hidden p-6 pb-40 space-y-6 max-w-lg mx-auto">
            <div class="flex justify-between items-center bg-white/5 backdrop-blur-xl p-1.5 rounded-full border border-white/10 mb-4">
                <div class="flex gap-1 w-full relative">
                    <div id="view-toggle-bg" class="absolute left-0 top-0 h-full w-1/2 bg-white rounded-full transition-transform duration-300"></div>
                    <button id="view-list-btn" class="flex-1 py-2.5 text-[10px] font-bold tracking-widest rounded-full text-black z-10 uppercase">List</button>
                    <button id="view-map-btn" class="flex-1 py-2.5 text-[10px] font-bold tracking-widest rounded-full text-white/50 z-10 uppercase">Map</button>
                </div>
            </div>
            <button id="roulette-btn" class="w-full bg-transparent border border-app-gold/40 text-app-gold font-serif font-medium text-xs tracking-[0.15em] py-4 rounded-xl active:scale-[0.98] transition-all flex justify-center items-center gap-3 uppercase">
                <i data-lucide="dices" class="w-4 h-4"></i> Random Pick
            </button>
            <div id="restaurant-list-view" class="space-y-4 mt-6"></div>
            <div id="restaurant-map-view" class="hidden mt-6 h-[50vh] rounded-3xl overflow-hidden border border-white/10 shadow-2xl relative mock-map-bg">
                <div class="absolute inset-0 flex items-center justify-center opacity-5 text-white font-serif text-2xl tracking-[0.5em] rotate-[-10deg]">MAP</div>
                <div id="map-pins-container" class="absolute inset-0"></div>
            </div>
        </div>
    </main>

    <!-- 底部懸浮區 -->
    <div id="bottom-actions" class="hidden fixed bottom-0 w-full p-5 bg-app-bg/80 backdrop-blur-2xl border-t border-white/10 pb-safe z-30 shrink-0">
        <div class="flex gap-3 max-w-lg mx-auto">
            <button id="back-to-setup" class="p-4 bg-white/5 rounded-xl border border-white/10 text-white/60 active:scale-95 transition-all"><i data-lucide="sliders-horizontal" class="w-5 h-5"></i></button>
            <button id="refresh-btn" class="flex-1 bg-white/5 text-white font-serif text-[10px] tracking-widest py-4 rounded-xl border border-white/10 active:scale-95 transition-all flex justify-center items-center gap-2 uppercase">Shuffle</button>
            <button id="share-btn" class="flex-1 bg-white text-black font-serif font-bold text-[10px] tracking-widest py-4 rounded-xl active:scale-95 transition-all flex justify-center items-center gap-2 uppercase">Share</button>
        </div>
    </div>

    <!-- 大轉盤 Modal -->
    <div id="roulette-modal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-6 backdrop-blur-xl">
        <div id="roulette-inner" class="bg-app-surface w-full max-w-xs rounded-3xl p-8 text-center shadow-2xl relative overflow-hidden border border-white/10">
            <div class="w-10 h-10 rounded-full flex items-center justify-center mx-auto mb-6 border border-app-gold/30 bg-app-gold/5"><i data-lucide="concierge-bell" class="w-5 h-5 text-app-gold"></i></div>
            <div class="h-20 flex items-center justify-center mb-8 overflow-hidden border-y border-white/10"><div id="slot-text" class="text-lg font-serif font-bold text-white px-4 tracking-wider">...</div></div>
            <button id="close-roulette" class="hidden w-full bg-white text-black font-serif font-bold tracking-widest py-4 rounded-xl uppercase text-xs">Accept</button>
        </div>
    </div>

    <!-- 餐廳詳細 Modal -->
    <div id="detail-modal" class="fixed inset-0 z-[60] bg-[#0a0a0a] overflow-y-auto transform translate-y-full transition-transform duration-500 ease-[cubic-bezier(0.2,0.8,0.2,1)] flex flex-col no-scrollbar" style="pointer-events:none">
        <div class="relative w-full h-[35vh] shrink-0">
            <img id="detail-img" src="" class="w-full h-full object-cover opacity-90">
            <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0a] via-transparent"></div>
            <button id="close-detail-btn" class="absolute top-6 right-6 p-3 bg-black/40 border border-white/10 rounded-full backdrop-blur-md text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div class="flex-1 px-6 pb-12 -mt-10 relative z-10 max-w-lg mx-auto w-full">
            <h2 id="detail-name" class="text-2xl font-serif font-bold text-white tracking-widest mb-4"></h2>
            <div class="flex items-center gap-3 mb-8"><div class="flex items-center gap-1.5 bg-app-gold/10 border border-app-gold/30 px-3 py-1 rounded-full"><i data-lucide="star" class="w-3 h-3 fill-app-gold text-app-gold"></i><span id="detail-rating" class="text-xs font-bold text-app-gold"></span></div></div>
            <div class="mb-8 pl-4 border-l border-app-gold/30"><h3 class="text-[10px] font-medium text-white/30 tracking-[0.2em] uppercase mb-2">About</h3><p id="detail-desc" class="text-sm font-light text-white/70 leading-relaxed"></p></div>
            <div class="mb-8"><h3 class="text-[10px] font-medium text-white/30 tracking-[0.2em] uppercase mb-3">Signature</h3><div id="detail-dishes" class="flex flex-wrap gap-2"></div></div>
            <div id="detail-extra"></div>
            <div id="detail-hours" class="hidden"></div>
            <div id="detail-address" class="hidden"></div>
            <a id="detail-nav-btn" href="#" target="_blank" class="w-full bg-white text-black font-serif font-bold text-[10px] tracking-widest py-4 rounded-xl flex justify-center items-center gap-2 uppercase"><i data-lucide="navigation" class="w-4 h-4"></i> Maps Navigate</a>
        </div>
    </div>

<script>
// ── DOM refs ──────────────────────────────────────────────
const dom = {
    stepSetup:       document.getElementById('step-setup'),
    stepLoading:     document.getElementById('step-loading'),
    stepResults:     document.getElementById('step-results'),
    bottomActions:   document.getElementById('bottom-actions'),
    findBtn:         document.getElementById('find-btn'),
    refreshBtn:      document.getElementById('refresh-btn'),
    backBtn:         document.getElementById('back-to-setup'),
    shareBtn:        document.getElementById('share-btn'),
    mainGreeting:    document.getElementById('main-greeting'),
    subGreeting:     document.getElementById('sub-greeting'),
    topTitle:        document.getElementById('app-top-title'),
    locDisplayArea:  document.getElementById('location-display-area'),
    locInputArea:    document.getElementById('location-input-area'),
    locInput:        document.getElementById('location-input'),
    locDisplayText:  document.getElementById('location-display-text'),
    autoLocatingIcon:document.getElementById('auto-locating-icon'),
    autoLocatedIcon: document.getElementById('auto-located-icon'),
    reGpsBtn:        document.getElementById('re-gps-btn'),
    locWarning:      document.getElementById('location-warning'),
    mealBtns:        document.querySelectorAll('.meal-btn'),
    budgetBtns:      document.querySelectorAll('.budget-btn'),
    peopleSlider:    document.getElementById('people-slider'),
    peopleCount:     document.getElementById('people-count-display'),
    vibeBtns:        document.querySelectorAll('.vibe-btn'),
    listView:        document.getElementById('restaurant-list-view'),
    mapView:         document.getElementById('restaurant-map-view'),
    viewListBtn:     document.getElementById('view-list-btn'),
    viewMapBtn:      document.getElementById('view-map-btn'),
    viewToggleBg:    document.getElementById('view-toggle-bg'),
    rouletteBtn:     document.getElementById('roulette-btn'),
    rouletteModal:   document.getElementById('roulette-modal'),
    slotText:        document.getElementById('slot-text'),
    closeRoulette:   document.getElementById('close-roulette'),
    detailModal:     document.getElementById('detail-modal'),
    detailImg:       document.getElementById('detail-img'),
    detailName:      document.getElementById('detail-name'),
    detailRating:    document.getElementById('detail-rating'),
    detailDesc:      document.getElementById('detail-desc'),
    detailHours:     document.getElementById('detail-hours'),
    detailAddress:   document.getElementById('detail-address'),
    detailDishes:    document.getElementById('detail-dishes'),
    detailNavBtn:    document.getElementById('detail-nav-btn'),
    closeDetailBtn:  document.getElementById('close-detail-btn'),
    headerLoc:       document.getElementById('header-location'),
    headerLocText:   document.getElementById('header-location-text'),
    loadingText:     document.getElementById('loading-text'),
    aiErrorMsg:      document.getElementById('ai-error-msg'),
};

// ── State ─────────────────────────────────────────────────
const state = {
    locationText: '',
    isLocationReady: false,
    meal: 'dinner',
    people: 2,
    vibe: 'casual',
    budget: '$',
    currentResults: []
};

const sessionResults = [];
const FALLBACK_IMG = 'https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=400&q=80';
// Claude API - no key needed in claude.ai environment


// ── Time config ───────────────────────────────────────────
const timeConfig = {
    breakfast: { greeting: '晨光中的<br><span class="text-app-gold">美好早餐</span>。', sub: '用一頓好早餐開啟美好的一天' },
    brunch:    { greeting: '悠閒的<br><span class="text-app-gold">週末早午餐</span>。', sub: '不急不徐，享受最美的上午時光' },
    lunch:     { greeting: '午間的<br><span class="text-app-gold">片刻美味</span>。', sub: '充實下午的能量，從一頓好午餐開始' },
    tea:       { greeting: '午後的<br><span class="text-app-gold">優雅時光</span>。', sub: '放慢腳步，細細品味午茶的滋味' },
    dinner:    { greeting: '尋找<br><span class="text-app-gold">極致美味</span>。', sub: '為您的夜晚，訂製專屬菜單' },
    latenight: { greeting: '夜深了，<br><span class="text-app-gold">覓食去</span>。', sub: '宵夜時光，尋找深夜的溫暖滋味' },
};

// ── GPS 定位 ──────────────────────────────────────────────
function triggerAutoLocation() {
    state.isLocationReady = false;
    dom.autoLocatingIcon.classList.remove('hidden');
    dom.autoLocatedIcon.classList.add('hidden');
    dom.locDisplayText.textContent = '定位中...';

    if (!navigator.geolocation) {
        dom.locDisplayText.textContent = '請手動輸入地點';
        dom.autoLocatingIcon.classList.add('hidden');
        return;
    }

    navigator.geolocation.getCurrentPosition(
        async function(pos) {
            try {
                const r = await fetch('https://nominatim.openstreetmap.org/reverse?lat=' + pos.coords.latitude + '&lon=' + pos.coords.longitude + '&format=json&accept-language=zh-TW');
                const d = await r.json();
                const a = d.address || {};
                const name = (a.suburb || a.neighbourhood || a.city_district || '') + (a.city || a.town || a.county || '');
                state.locationText = name || d.display_name.split(',')[0];
            } catch(e) {
                state.locationText = pos.coords.latitude.toFixed(3) + ',' + pos.coords.longitude.toFixed(3);
            }
            state.isLocationReady = true;
            dom.autoLocatingIcon.classList.add('hidden');
            dom.autoLocatedIcon.classList.remove('hidden');
            dom.locDisplayText.textContent = state.locationText;
            dom.locInput.value = state.locationText;
        },
        function() {
            dom.autoLocatingIcon.classList.add('hidden');
            dom.locDisplayText.textContent = '無法定位，請手動輸入';
            dom.locDisplayArea.click();
        },
        { enableHighAccuracy: true, timeout: 10000 }
    );
}

// ── View switch ───────────────────────────────────────────
function showOnly(target) {
    [dom.stepSetup, dom.stepLoading, dom.stepResults].forEach(function(v) {
        v.classList.add('hidden');
    });
    dom.bottomActions.classList.add('hidden');
    dom.headerLoc.classList.add('hidden');
    target.classList.remove('hidden');
    if (target === dom.stepResults) {
        dom.bottomActions.classList.remove('hidden');
        dom.headerLoc.classList.remove('hidden');
        dom.headerLocText.textContent = state.locationText;
    }
}
