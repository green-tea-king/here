            <div class="flex items-center gap-3 mb-8"><div class="flex items-center gap-1.5 bg-app-gold/10 border border-app-gold/30 px-3 py-1 rounded-full"><i data-lucide="star" class="w-3 h-3 fill-app-gold text-app-gold"></i><span id="detail-rating" class="text-xs font-bold text-app-gold"></span></div></div>
            <div class="mb-8 pl-4 border-l border-app-gold/30"><h3 class="text-[10px] font-medium text-white/30 tracking-[0.2em] uppercase mb-2">About</h3><p id="detail-desc" class="text-sm font-light text-white/70 leading-relaxed"></p></div>
            <div class="mb-8"><h3 class="text-[10px] font-medium text-white/30 tracking-[0.2em] uppercase mb-3">Signature</h3><div id="detail-dishes" class="flex flex-wrap gap-2"></div></div>
            <div id="detail-extra"></div>

        </div>

<script>
// ── DOM refs ──────────────────────────────────────────────
const dom = {
    stepSetup:       document.getElementById('step-setup'),
    stepLoading:     document.getElementById('step-loading'),
    stepResults:     document.getElementById('step-results'),
    bottomActions:   document.getElementById('bottom-actions'),
    findBtn:         document.getElementById('find-btn'),
    refreshBtn:      document.getElementById('refresh-btn'),
    backBtn:         document.getElementById('back-to-setup'),
    shareBtn:        document.getElementById('share-btn'),
    mainGreeting:    document.getElementById('main-greeting'),
    subGreeting:     document.getElementById('sub-greeting'),
    topTitle:        document.getElementById('app-top-title'),
    locDisplayArea:  document.getElementById('location-display-area'),
    locInputArea:    document.getElementById('location-input-area'),
    locInput:        document.getElementById('location-input'),
    locDisplayText:  document.getElementById('location-display-text'),
    autoLocatingIcon:document.getElementById('auto-locating-icon'),
    autoLocatedIcon: document.getElementById('auto-located-icon'),
    reGpsBtn:        document.getElementById('re-gps-btn'),
    locWarning:      document.getElementById('location-warning'),
    mealBtns:        document.querySelectorAll('.meal-btn'),
    budgetBtns:      document.querySelectorAll('.budget-btn'),
    peopleSlider:    document.getElementById('people-slider'),
    peopleCount:     document.getElementById('people-count-display'),
    vibeBtns:        document.querySelectorAll('.vibe-btn'),
    listView:        document.getElementById('restaurant-list-view'),
    mapView:         document.getElementById('restaurant-map-view'),
    viewListBtn:     document.getElementById('view-list-btn'),
    viewMapBtn:      document.getElementById('view-map-btn'),
    viewToggleBg:    document.getElementById('view-toggle-bg'),
    rouletteBtn:     document.getElementById('roulette-btn'),
    rouletteModal:   document.getElementById('roulette-modal'),
    slotText:        document.getElementById('slot-text'),
    closeRoulette:   document.getElementById('close-roulette'),
    detailModal:     document.getElementById('detail-modal'),
    detailImg:       document.getElementById('detail-img'),
    detailName:      document.getElementById('detail-name'),
    detailRating:    document.getElementById('detail-rating'),
    detailDesc:      document.getElementById('detail-desc'),
    detailHours:     document.getElementById('detail-hours'),
    detailAddress:   document.getElementById('detail-address'),
    detailDishes:    document.getElementById('detail-dishes'),
    detailNavBtn:    document.getElementById('detail-nav-btn'),
    closeDetailBtn:  document.getElementById('close-detail-btn'),
    headerLoc:       document.getElementById('header-location'),
    headerLocText:   document.getElementById('header-location-text'),
    loadingText:     document.getElementById('loading-text'),
    aiErrorMsg:      document.getElementById('ai-error-msg'),
};

// ── State ─────────────────────────────────────────────────
const state = {
    locationText: '',
    isLocationReady: false,
    meal: 'dinner',
    people: 2,
    vibe: 'casual',
    budget: '$',
    currentResults: []
};

const sessionResults = [];
const FALLBACK_IMG = 'https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=400&q=80';
// Claude API - no key needed in claude.ai environment


// ── Time config ───────────────────────────────────────────
const timeConfig = {
    breakfast: { greeting: '晨光中的<br><span class="text-app-gold">美好早餐</span>。', sub: '用一頓好早餐開啟美好的一天' },
    brunch:    { greeting: '悠閒的<br><span class="text-app-gold">週末早午餐</span>。', sub: '不急不徐，享受最美的上午時光' },
    lunch:     { greeting: '午間的<br><span class="text-app-gold">片刻美味</span>。', sub: '充實下午的能量，從一頓好午餐開始' },
    tea:       { greeting: '午後的<br><span class="text-app-gold">優雅時光</span>。', sub: '放慢腳步，細細品味午茶的滋味' },
    dinner:    { greeting: '尋找<br><span class="text-app-gold">極致美味</span>。', sub: '為您的夜晚，訂製專屬菜單' },
    latenight: { greeting: '夜深了，<br><span class="text-app-gold">覓食去</span>。', sub: '宵夜時光，尋找深夜的溫暖滋味' },
};

// ── GPS 定位 ──────────────────────────────────────────────
function triggerAutoLocation() {
    state.isLocationReady = false;
    dom.autoLocatingIcon.classList.remove('hidden');
    dom.autoLocatedIcon.classList.add('hidden');
    dom.locDisplayText.textContent = '定位中...';

    if (!navigator.geolocation) {
        dom.locDisplayText.textContent = '請手動輸入地點';
        dom.autoLocatingIcon.classList.add('hidden');
        return;
    }

    navigator.geolocation.getCurrentPosition(
        async function(pos) {
            try {
                const r = await fetch('https://nominatim.openstreetmap.org/reverse?lat=' + pos.coords.latitude + '&lon=' + pos.coords.longitude + '&format=json&accept-language=zh-TW');
                const d = await r.json();
                const a = d.address || {};
                const name = (a.suburb || a.neighbourhood || a.city_district || '') + (a.city || a.town || a.county || '');
                state.locationText = name || d.display_name.split(',')[0];
            } catch(e) {
                state.locationText = pos.coords.latitude.toFixed(3) + ',' + pos.coords.longitude.toFixed(3);
            }
            state.isLocationReady = true;
            dom.autoLocatingIcon.classList.add('hidden');
            dom.autoLocatedIcon.classList.remove('hidden');
            dom.locDisplayText.textContent = state.locationText;
            dom.locInput.value = state.locationText;
        },
        function() {
            dom.autoLocatingIcon.classList.add('hidden');
            dom.locDisplayText.textContent = '無法定位，請手動輸入';

function showOnly(target) {

// ── AI Search ─────────────────────────────────────────────
async function getAIRecommendations() {
    const mealMap = { breakfast:'早餐', brunch:'早午餐', lunch:'午餐', tea:'下午茶', dinner:'晚餐', latenight:'宵夜' };
    const vibeMap = { casual:'輕鬆休閒', date:'浪漫約會', party:'歡聚慶祝', work:'安靜專注' };
    const budgetMap = { '$':'平價實惠', '$$':'精緻享受', '$$$':'奢華饗宴' };

    const prompt = '你是台灣美食專家與在地達人。推薦3家在「' + state.locationText + '」真實存在的知名餐廳。'
        + '時段：' + mealMap[state.meal] + '，預算：' + budgetMap[state.budget]
        + '，人數：' + state.people + '人，氣氛：' + vibeMap[state.vibe] + '。'
        + '請根據你對這些餐廳的了解，提供詳盡且真實的資訊。'
        + '只回傳合法JSON物件，不加說明或markdown。'
        + '格式：{"restaurants":[{'
        + '"name":"餐廳名稱",'
        + '"rating":4.5,'
        + '"reviews":1200,'
        + '"price":"$300-500/人",'
        + '"tags":["標籤1","標籤2","標籤3"],'
        + '"cuisine":"料理類型",'
        + '"desc":"詳細的餐廳介紹，包含特色風格環境氛圍，至少50字",'
        + '"story":"餐廳背景故事或主廚理念，至少30字",'
        + '"review":"真實感的顧客評語",'
        + '"mustOrder":"必點推薦理由，一句話",'
        + '"dishes":["招牌菜1","招牌菜2","招牌菜3","招牌菜4","招牌菜5"],'
        + '"hours":"營業時間（含公休日）",'
        + '"phone":"電話號碼",'
        + '"address":"詳細地址",'
        + '"nearbyMRT":"最近捷運站（若有）",'
        + '"parking":"停車資訊",'
        + '"reservation":"訂位方式（是否需要、如何訂位）",'
        + '"tips":"達人小提示（最佳用餐時間、注意事項等）",'
        + '"imgKeyword":"英文食物圖片關鍵字 如 ramen noodles soup"'
        + '}]}';

    try {
        const res = await fetch('https://green-queen-06f3.rh-taipei.workers.dev', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({
                model: 'llama-3.3-70b-versatile',
                max_tokens: 4096,
                messages: [{ role: 'user', content: prompt }]
            })
        });
        const rawText = await res.text();
        let data;
        try { data = JSON.parse(rawText); } catch(e) { throw new Error('HTTP ' + res.status + ': ' + rawText.slice(0,150)); }
        if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
        const txt = data.choices[0].message.content;
        let restaurants = [];
        try {
            // Strip all markdown fences and find JSON object
            let clean = txt.replace(/```[a-z]*/g, '').replace(/```/g, '').trim();
            const objStart = clean.indexOf('{');
            const objEnd = clean.lastIndexOf('}');
            if (objStart === -1) throw new Error('no JSON found');
            const parsed = JSON.parse(clean.slice(objStart, objEnd + 1));
            restaurants = parsed.restaurants || [];
        } catch(pe) {
            window._lastAIError = pe.message + ' | 回應: ' + txt.slice(0, 150);
            return [];
        }
        var fallbackImgs = [
            'https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=400&q=80',
            'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400&q=80',
            'https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?w=400&q=80',
        ];
        restaurants.forEach(function(r, i) {
            r.id = Date.now() + i;
            r.img = fallbackImgs[i % fallbackImgs.length];
            sessionResults.push(r);
        });

        // After rendering, fetch Wikipedia images for each restaurant
        function fetchWikiImage(r) {
            // Try zh Wikipedia first, then en
            var queries = [
                'https://zh.wikipedia.org/w/api.php?action=query&titles=' + encodeURIComponent(r.name) + '&prop=pageimages&format=json&pithumbsize=600&origin=*',
                'https://en.wikipedia.org/w/api.php?action=query&titles=' + encodeURIComponent(r.name) + '&prop=pageimages&format=json&pithumbsize=600&origin=*',
                // Also try Wikimedia Commons search
                'https://commons.wikimedia.org/w/api.php?action=query&list=search&srsearch=' + encodeURIComponent(r.name + ' restaurant food') + '&srnamespace=6&format=json&origin=*&srlimit=1'
            ];

            function tryQuery(idx) {
                if (idx >= queries.length) return;
                fetch(queries[idx])
                    .then(function(res) { return res.json(); })
                    .then(function(data) {
                        var imgUrl = null;
                        if (data.query && data.query.pages) {
                            var pages = data.query.pages;
                            var page = pages[Object.keys(pages)[0]];
                            if (page && page.thumbnail) imgUrl = page.thumbnail.source;
                        } else if (data.query && data.query.search && data.query.search.length > 0) {
                            var title = data.query.search[0].title;
                            // Get image from this Commons file
                            return fetch('https://commons.wikimedia.org/w/api.php?action=query&titles=' + encodeURIComponent(title) + '&prop=imageinfo&iiprop=url&format=json&origin=*')
                                .then(function(r2){ return r2.json(); })
                                .then(function(d2){
                                    var pg = d2.query.pages;
                                    var p = pg[Object.keys(pg)[0]];
                                    if (p && p.imageinfo && p.imageinfo[0]) {
                                        updateImg(r, p.imageinfo[0].url);
                                    } else {
                                        tryQuery(idx + 1);
                                    }
                                });
                        }
                        if (imgUrl) {
                            updateImg(r, imgUrl);
                        } else {
                            tryQuery(idx + 1);
                        }
                    })
                    .catch(function() { tryQuery(idx + 1); });
            }
            tryQuery(0);
        }

        function updateImg(r, url) {
            r.img = url;
            // Update card image
            var card = document.querySelector('[data-rid="' + r.id + '"]');
            if (card) {
                var img = card.querySelector('img');
                if (img) img.src = url;
            }
        }

        // Fetch images with staggered timing to avoid rate limits
        state.currentResults.forEach(function(r, i) {
            setTimeout(function() { fetchWikiImage(r); }, i * 500);
        });
        return restaurants;
    } catch(e) {
        console.error(e);
        window._lastAIError = e.message;
        return [];
    }
}

async function performSearch(msg) {
    dom.aiErrorMsg.classList.add('hidden');
    dom.locWarning.classList.add('hidden');
    if (!state.isLocationReady || !state.locationText) {
        dom.locWarning.classList.remove('hidden');
        return;
    }
    dom.loadingText.textContent = msg;
    showOnly(dom.stepLoading);
    const results = await getAIRecommendations();
    if (results.length === 0) {
        showOnly(dom.stepSetup);
        dom.aiErrorMsg.textContent = window._lastAIError ? ('錯誤：' + window._lastAIError.slice(0,80)) : 'AI 搜尋遇到問題，請稍後再試';
        dom.aiErrorMsg.classList.remove('hidden');
        return;
    }
    state.currentResults = results;
    renderList();
    renderMap();
    showOnly(dom.stepResults);
}

window.addEventListener('DOMContentLoaded', function() {
    lucide.createIcons();
    const hour = new Date().getHours();
    let type = 'dinner';
    if (hour >= 5 && hour < 10) type = 'breakfast';
    else if (hour >= 10 && hour < 12) type = 'brunch';
    else if (hour >= 12 && hour < 15) type = 'lunch';
    else if (hour >= 15 && hour < 18) type = 'tea';
    else if (hour >= 18 && hour < 22) type = 'dinner';
    else type = 'latenight';
    setMealType(type);
